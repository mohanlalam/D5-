                    {mainTeams.map(t=>{const cfg=D5_TEAM_CONFIG[t]||{color:"#888"};return<td key={t} style={{padding:"10px 12px",textAlign:"center",fontFamily:"'Bebas Neue',cursive",fontSize:24,color:cfg.color}}>{(grand[t]||0).toLocaleString()}</td>;})}
                    <td/>
                  </tr></tfoot>
                </table>
              </div>
            </Card>
          </div>
        )}
        {view==="matches"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16,flexWrap:"wrap",gap:8}}>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:22}}>All Matches ({filteredMatches.length})</div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
                {["ALL",...allTeams].map(t=>{const cfg=D5_TEAM_CONFIG[t]||{color:"#888"};return(
                  <button key={t} onClick={()=>setFilterTeam(t)} style={{padding:"4px 12px",borderRadius:20,border:\`1px solid \${filterTeam===t?(cfg.color||"#00C9FF"):"#2a2a4a"}\`,background:filterTeam===t?\`\${(cfg.color||"#00C9FF")}18\`:"transparent",color:filterTeam===t?(cfg.color||"#00C9FF"):"#444",cursor:"pointer",fontSize:11,fontFamily:"'Bebas Neue',cursive",letterSpacing:1}}>
                    {t}
                  </button>
                );})}
              </div>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12}}>
              {filteredMatches.map(m=>{
                const sorted=Object.entries(m.totals).sort((a,b)=>b[1]-a[1]);
                const top=sorted[0];const topCfg=D5_TEAM_CONFIG[top?.[0]]||{color:"#888"};
                return(
                  <div key={m.id} onClick={()=>setSelMatch(m)} style={{background:"#11112a",border:"1px solid #1e1e40",borderRadius:12,overflow:"hidden",cursor:"pointer",transition:"all .2s"}}
                    onMouseEnter={e=>{e.currentTarget.style.borderColor=topCfg.color;e.currentTarget.style.transform="translateY(-2px)";}}
                    onMouseLeave={e=>{e.currentTarget.style.borderColor="#1e1e40";e.currentTarget.style.transform="";}}>

                    <div style={{padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:16}}>{m.sheet}</div><div style={{fontSize:10,color:"#444"}}>{m.date}</div></div>
                      {top&&<div style={{fontFamily:"'Bebas Neue',cursive",fontSize:11,padding:"2px 8px",borderRadius:8,background:\`\${topCfg.color}20\`,color:topCfg.color}}>🏆 {top[0]}</div>}
                    </div>
                    <div style={{padding:"0 14px 12px",display:"flex",gap:8,flexWrap:"wrap"}}>
                      {sorted.map(([t,pts])=>{const cfg=D5_TEAM_CONFIG[t]||{color:"#888"};return(
                        <div key={t} style={{display:"flex",gap:6,alignItems:"center",padding:"4px 10px",borderRadius:6,background:\`\${cfg.color}0f\`,border:\`1px solid \${cfg.color}33\`}}>
                          <span style={{color:cfg.color,fontFamily:"'Bebas Neue',cursive",fontSize:12}}>{t}</span>
                          <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:18,color:t===top?.[0]?cfg.color:"#fff"}}>{pts}</span>
                        </div>
                      );})}
                    </div>
                  </div>
                );
              })}
            </div>
          </div>
        )}
        {view==="scoring"&&(
          <div>
            <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:22,marginBottom:20}}>📊 D5 Scoring System</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:20}}>
              <Card>
                <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:16,color:"#00C9FF",marginBottom:12}}>BASE POINTS</div>
                {[["Run","×5"],["Wicket","×100"],["Run Out","×50"],["Stumping","×50"],["Catch","×50"],["Duck","×(−50)"]].map(([l,v])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"7px 0",borderBottom:"1px solid #0f0f25"}}>
                    <span style={{fontSize:14,color:"#ccc"}}>{l}</span>
                    <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,color:l==="Duck"?"#ff6b6b":"#fff"}}>{v}</span>
                  </div>
                ))}
              </Card>
              <Card>
                <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:16,color:"#FFB830",marginBottom:12}}>BONUS POINTS</div>
                {[["Runs 30-50","+50"],["Runs 50-100","+150"],["Runs 100+","+250"],["2 Wkts","+50"],["3 Wkts","+150"],["5 Wkts","+200"],["6 Wkts","+100"],["3 Catches","+100"],["5 Catches","+200"],["3 Ro/Stmp","+100"],["5-9 Sixes","+150"],["10+ Sixes","+300"],["Hat-trick","+400"],["Maiden","+200 each"]].map(([l,v])=>(
                  <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid #0f0f25"}}>
                    <span style={{fontSize:13,color:"#aaa"}}>{l}</span>
                    <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:17,color:"#FFB830"}}>{v}</span>
                  </div>
                ))}
              </Card>
            </div>
            <Card style={{border:"1px solid #A8FF3E33"}}>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:16,color:"#A8FF3E",marginBottom:8}}>🌟 CAPTAIN RULE</div>
              <div style={{fontSize:13,color:"#aaa",lineHeight:1.8}}>First player listed per team = <strong style={{color:"#A8FF3E"}}>Captain</strong>. Their total score is <strong style={{color:"#A8FF3E"}}>×2</strong>.</div>
            </Card>
          </div>
        )}
      </div>
    </div>
  );
}

// ─── D5 2026 FANTASY ─────────────────────────────────────────────────────────
function D5Fantasy({isEditor, onRequestEditor}){
  const [teams,setTeams]=useState(DEFAULT_2026_TEAMS);
  const [entries,setEntries]=useState([]);
  const [fbReady,setFbReady]=useState(false);
  const [view,setView]=useState("leaderboard");
  const [editId,setEditId]=useState(null);
  const [draftEntry,setDraftEntry]=useState(null);
  const [editingTeamId,setEditingTeamId]=useState(null);
  const [teamNameDraft,setTeamNameDraft]=useState("");
  const [teamColorDraft,setTeamColorDraft]=useState("");
  const [showLock,setShowLock]=useState(false);
  const [pendingAction,setPendingAction]=useState(null);

  const requireEditor=(action)=>{
    if(isEditor){action();}
    else{setPendingAction(()=>action);setShowLock(true);}
  };
  const handleUnlock=()=>{
    setShowLock(false);
    onRequestEditor();
    if(pendingAction){pendingAction();setPendingAction(null);}
  };

  // ── Firebase sync ──────────────────────────────────────────────────────────
  useEffect(()=>{
    const teamsRef = window.db.ref("d5_2026_teams");
    const entriesRef = window.db.ref("d5_2026_entries");
    teamsRef.on("value", snap=>{
      const val=snap.val();
      if(val) setTeams(val);
      setFbReady(true);
    });
    entriesRef.on("value", snap=>{
      const val=snap.val();
      setEntries(val ? Object.values(val) : []);
    });
    return()=>{teamsRef.off(); entriesRef.off();};
  },[]);

  // Write teams to Firebase (editor only action, so safe to write on change)
  const saveTeamsToFb=(newTeams)=>{
    setTeams(newTeams);
    window.db.ref("d5_2026_teams").set(newTeams);
  };
  // Write single entry
  const saveEntryToFb=(entry)=>{
    window.db.ref("d5_2026_entries/"+entry.id).set(entry);
  };
  // Delete entry
  const deleteEntryFromFb=(id)=>{
    window.db.ref("d5_2026_entries/"+id).remove();
  };

  // Grand totals
  // Per match: winner earns sum of (winner_pts - each_loser_pts); losers earn negative diffs
  const matchScores = entries.map(e=>{
    const scores = teams.reduce((acc,t)=>{
      acc[t.id]=(e.teamData[t.id]||[]).reduce((s,p)=>s+calcPts(p),0);
      return acc;
    },{});
    const maxPts = Math.max(...Object.values(scores));
    const winnerId = maxPts>0 ? teams.find(t=>scores[t.id]===maxPts)?.id : null;
    const net = {};
    teams.forEach(t=>{
      if(t.id===winnerId){
        // winner earns sum of differences vs all losers
        net[t.id]=teams.filter(tt=>tt.id!==t.id).reduce((s,tt)=>s+(scores[t.id]-scores[tt.id]),0);
      } else {
        // loser loses difference vs winner
        net[t.id]=winnerId ? (scores[t.id]-scores[winnerId]) : 0;
      }
    });
    return {scores, winnerId, net};
  });
  const grandTotals = teams.reduce((acc,t)=>{
    acc[t.id]=matchScores.reduce((s,ms)=>s+(ms.net[t.id]||0),0);
    return acc;
  },{});
  const wins = teams.reduce((acc,t)=>{
    acc[t.id]=matchScores.filter(ms=>ms.winnerId===t.id).length;
    return acc;
  },{});

  const startNew=()=>requireEditor(()=>{
    setDraftEntry(blankEntry(teams));
    setEditId(null);
    setView("newEntry");
  });
  const startEdit=(e)=>requireEditor(()=>{
    setDraftEntry(JSON.parse(JSON.stringify(e)));
    setEditId(e.id);
    setView("newEntry");
  });
  const saveEntry=()=>{
    if(!draftEntry)return;
    saveEntryToFb(draftEntry);
    if(editId){setEntries(prev=>prev.map(e=>e.id===editId?draftEntry:e));}
    else{setEntries(prev=>[...prev,draftEntry]);}
    setView("entries");setDraftEntry(null);setEditId(null);
  };
  const deleteEntry=(id)=>requireEditor(()=>{setEntries(prev=>prev.filter(e=>e.id!==id));deleteEntryFromFb(id);});

  const updatePlayer=(teamId,playerIdx,field,val)=>{
    setDraftEntry(prev=>{
      const nd=JSON.parse(JSON.stringify(prev));
      nd.teamData[teamId][playerIdx][field]=val;
      return nd;
    });
  };
  const addPlayer=(teamId)=>{
    setDraftEntry(prev=>{const nd=JSON.parse(JSON.stringify(prev));nd.teamData[teamId].push(blankPlayer());return nd;});
  };
  const removePlayer=(teamId,idx)=>{
    setDraftEntry(prev=>{const nd=JSON.parse(JSON.stringify(prev));nd.teamData[teamId].splice(idx,1);return nd;});
  };

  const SubTab=({k,children,accent="#00C9FF"})=>(
    <button onClick={()=>setView(k)} style={{padding:"8px 16px",border:"none",cursor:"pointer",
      background:view===k?\`\${accent}18\`:"transparent",color:view===k?accent:"#555",
      fontFamily:"'Bebas Neue',cursive",fontSize:14,letterSpacing:1,
      borderBottom:view===k?\`3px solid \${accent}\`:"3px solid transparent",transition:"all .2s"}}>
      {children}
    </button>
  );

  const COLORS=["#00C9FF","#FF6B35","#A8FF3E","#FFB830","#c084fc","#f87171","#34d399","#fb923c"];

  return(
    <div>
      {/* Team name editor modal */}
      {editingTeamId&&(
        <div style={{position:"fixed",inset:0,background:"#000c",display:"flex",alignItems:"center",justifyContent:"center",zIndex:999}}>
          <Card style={{width:340,border:"1px solid #3a2a6a"}}>
            <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,marginBottom:16}}>✏️ Edit Team</div>
            <Lbl>Team Name</Lbl>
            <Inp value={teamNameDraft} onChange={e=>setTeamNameDraft(e.target.value)} placeholder="Team name" style={{marginBottom:12}}/>
            <Lbl>Colour</Lbl>
            <div style={{display:"flex",gap:8,flexWrap:"wrap",marginBottom:16}}>
              {COLORS.map(c=>(
                <div key={c} onClick={()=>setTeamColorDraft(c)}
                  style={{width:30,height:30,borderRadius:"50%",background:c,cursor:"pointer",
                    border:\`3px solid \${teamColorDraft===c?"#fff":"transparent"}\`,transition:"all .15s"}}/>
              ))}
              <input type="color" value={teamColorDraft} onChange={e=>setTeamColorDraft(e.target.value)}
                style={{width:30,height:30,border:"none",background:"none",cursor:"pointer",padding:0}}/>
            </div>
            <div style={{display:"flex",gap:8}}>
              <Btn variant="success" onClick={()=>{const updated=teams.map(t=>t.id===editingTeamId?{...t,name:teamNameDraft,color:teamColorDraft}:t);saveTeamsToFb(updated);setEditingTeamId(null);}}>Save</Btn>
              <Btn variant="ghost" onClick={()=>setEditingTeamId(null)}>Cancel</Btn>
            </div>
          </Card>
        </div>
      )}

      {!fbReady&&<div style={{position:"fixed",inset:0,background:"#07071a",zIndex:2000,display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12}}><div style={{width:36,height:36,border:"3px solid #1a1a4a",borderTopColor:"#00C9FF",borderRadius:"50%",animation:"spin 0.8s linear infinite"}}/><div style={{fontSize:12,color:"#444",letterSpacing:2}}>CONNECTING...</div></div>}
      {showLock&&<EditorLockModal onUnlock={handleUnlock} onClose={()=>{setShowLock(false);setPendingAction(null);}}/>}

      {/* Header */}
      <div style={{background:"linear-gradient(90deg,#0a0a20,#0a1a0a,#0a0a20)",borderBottom:"1px solid #1a3a1a",padding:"14px 0 0"}}>
        <div style={{maxWidth:1400,margin:"0 auto",padding:"0 24px"}}>
          <div style={{display:"flex",alignItems:"center",gap:16,marginBottom:12,flexWrap:"wrap"}}>
            <div>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:22,letterSpacing:2,color:"#A8FF3E"}}>D5 IPL 2026 — FANTASY LEAGUE</div>
              <div style={{fontSize:10,color:"#444",letterSpacing:2}}>{entries.length} MATCHES ENTERED</div>
            </div>
            {/* Team chips with edit */}
            <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
              {teams.map(t=>(
                <div key={t.id} onClick={()=>requireEditor(()=>{setEditingTeamId(t.id);setTeamNameDraft(t.name);setTeamColorDraft(t.color);})}
                  style={{padding:"4px 12px",borderRadius:20,background:\`\${t.color}12\`,border:\`1px solid \${t.color}44\`,
                    color:t.color,fontFamily:"'Bebas Neue',cursive",fontSize:12,cursor:"pointer",
                    display:"flex",alignItems:"center",gap:5}}>
                  {t.emoji} {t.name} {isEditor?"✏️":"🔒"}
                </div>
              ))}
            </div>
            <Btn variant="success" onClick={startNew}>+ New Match Entry</Btn>
            {isEditor
              ? <div style={{padding:"3px 10px",borderRadius:20,background:"#FFB83020",border:"1px solid #FFB83044",color:"#FFB830",fontSize:10,fontFamily:"'Bebas Neue',cursive",letterSpacing:1}}>✓ EDITOR</div>
              : <div onClick={()=>setShowLock(true)} style={{padding:"3px 10px",borderRadius:20,background:"#2a2a5a20",border:"1px solid #2a2a5a",color:"#555",fontSize:10,fontFamily:"'Bebas Neue',cursive",letterSpacing:1,cursor:"pointer"}} title="Click to unlock editing">🔒 VIEWER</div>
            }
          </div>
          <div style={{display:"flex",gap:2}}>
            <SubTab k="leaderboard" accent="#FFB830">🏆 Leaderboard</SubTab>
            <SubTab k="entries" accent="#00C9FF">📋 Match Entries</SubTab>
            <SubTab k="scoring" accent="#A8FF3E">📊 Scoring</SubTab>
          </div>
        </div>
      </div>

      <div style={{maxWidth:1400,margin:"0 auto",padding:"22px 24px"}}>

        {/* ─── LEADERBOARD ─── */}
        {view==="leaderboard"&&(
          <div>
            {entries.length===0?(
              <Card style={{textAlign:"center",padding:48}}>
                <div style={{fontSize:48,marginBottom:12}}>🏏</div>
                <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:22,color:"#A8FF3E",marginBottom:8}}>D5 2026 Season</div>
                <div style={{color:"#444",fontSize:13,marginBottom:20}}>No match data yet. Add your first match to start tracking!</div>
                <Btn variant="success" onClick={startNew}>+ Add First Match</Btn>
              </Card>
            ):(
              <div>
                {/* Podium */}
                <div style={{display:"grid",gridTemplateColumns:\`repeat(\${teams.length},1fr)\`,gap:14,marginBottom:28}}>
                  {[...teams].sort((a,b)=>grandTotals[b.id]-grandTotals[a.id]).map((t,i)=>(
                    <Card key={t.id} style={{border:\`1px solid \${t.color}\${i===0?"77":"33"}\`,
                      background:\`linear-gradient(135deg,\${t.color}\${i===0?"14":"0a"},#11112a)\`,
                      textAlign:"center",padding:"20px 14px",position:"relative",overflow:"hidden"}}>
                      <div style={{position:"absolute",top:-8,right:4,fontFamily:"'Bebas Neue',cursive",fontSize:90,color:\`\${t.color}07\`,lineHeight:1}}>{i+1}</div>
                      <div style={{fontSize:28,marginBottom:4}}>{["🥇","🥈","🥉","🏅"][i]||"🎖"}</div>
                      <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:22,color:t.color}}>{t.name}</div>
                      <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:56,color:"#fff",lineHeight:1.1}}>{grandTotals[t.id].toLocaleString()}</div>
                      <div style={{fontSize:10,color:"#555",marginTop:4}}>Total Points</div>
                      <div style={{display:"flex",justifyContent:"center",gap:16,marginTop:12}}>
                        {[["W",wins[t.id],t.color],["M",entries.length,"#888"]].map(([l,v,c])=>(
                          <div key={l}><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,color:c}}>{v}</div><div style={{fontSize:9,color:"#444"}}>{l}</div></div>
                        ))}
                      </div>
                    </Card>
                  ))}
                </div>
                {/* Match-by-match table */}
                <Card>
                  <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:16,color:"#555",marginBottom:14}}>MATCH-BY-MATCH RESULTS</div>
                  <div style={{overflowX:"auto"}}>
                    <table style={{width:"100%",borderCollapse:"collapse"}}>
                      <thead><tr>
                        <th style={{...thS,textAlign:"left"}}>Match</th>
                        <th style={{...thS,textAlign:"left"}}>Date</th>
                        {teams.map(t=><th key={t.id} style={{...thS,color:t.color}}>{t.name}</th>)}
                        <th style={thS}>Winner</th>
                      </tr></thead>
                      <tbody>
                        {entries.map((e,ei)=>{
                          const ms=matchScores[ei]||{scores:{},winnerId:null,net:{}};
                          const winTeam=teams.find(t=>t.id===ms.winnerId);
                          return(
                            <tr key={e.id} style={{borderBottom:"1px solid #0f0f25",cursor:"pointer"}} onClick={()=>startEdit(e)}>
                              <td style={{padding:"8px 12px",fontFamily:"'Bebas Neue',cursive",fontSize:14,color:"#aaa"}}>{e.matchLabel||"Match"}</td>
                              <td style={{padding:"8px 12px",fontSize:11,color:"#444"}}>{e.date}</td>
                              {teams.map(t=>{
                                const rawPts=ms.scores[t.id]||0;
                                const net=ms.net[t.id]||0;
                                const isW=t.id===ms.winnerId&&rawPts>0;
                                return(
                                  <td key={t.id} style={{padding:"8px 12px",textAlign:"center",background:isW?(t.color+"10"):"transparent"}}>
                                    <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:18,color:isW?t.color:"#888"}}>{rawPts||"-"}</div>
                                    <div style={{fontSize:10,color:net>0?"#A8FF3E":net<0?"#ff6b6b":"#333",fontFamily:"'Bebas Neue',cursive"}}>
                                      {net>0?"+"+net.toLocaleString():net<0?net.toLocaleString():""}
                                    </div>
                                  </td>
                                );
                              })}
                              <td style={{padding:"8px 12px",textAlign:"center"}}>{winTeam&&<span style={{padding:"2px 8px",borderRadius:8,fontSize:11,background:(winTeam.color+"20"),color:winTeam.color,fontFamily:"'Bebas Neue',cursive"}}>{winTeam.name}</span>}</td>
                            </tr>
                          );
                        })}
                      </tbody>
                      <tfoot><tr style={{borderTop:"2px solid #2a2a55"}}>
                        <td colSpan={2} style={{padding:"10px 12px",fontFamily:"'Bebas Neue',cursive",fontSize:12,color:"#444"}}>SEASON TOTAL</td>
                        {teams.map(t=><td key={t.id} style={{padding:"10px 12px",textAlign:"center",fontFamily:"'Bebas Neue',cursive",fontSize:26,color:t.color}}>{grandTotals[t.id].toLocaleString()}</td>)}
                        <td/>
                      </tr></tfoot>
                    </table>
                  </div>
                </Card>
              </div>
            )}
          </div>
        )}

        {/* ─── MATCH ENTRIES ─── */}
        {view==="entries"&&(
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:22}}>Match Entries ({entries.length})</div>
              <Btn variant="success" onClick={startNew}>+ New Entry</Btn>
            </div>
            {entries.length===0&&<Card style={{textAlign:"center",padding:32}}><div style={{color:"#444"}}>No entries yet.</div></Card>}
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(320px,1fr))",gap:12}}>
              {entries.map(e=>{
                const scores=teams.map(t=>({t,pts:(e.teamData[t.id]||[]).reduce((s,p)=>s+calcPts(p),0)})).sort((a,b)=>b.pts-a.pts);
                const top=scores[0];
                return(
                  <div key={e.id} style={{background:"#11112a",border:\`1px solid \${top?.t?.color||"#1e1e40"}33\`,borderRadius:12,overflow:"hidden"}}>
                    <div style={{height:3,background:\`linear-gradient(90deg,\${top?.t?.color||"#444"},\${top?.t?.color||"#444"}44)\`}}/>
                    <div style={{padding:"10px 14px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:15}}>{e.matchLabel||"Match"}</div><div style={{fontSize:10,color:"#444"}}>{e.date}</div></div>
                      <div style={{display:"flex",gap:6}}>
                        <Btn small variant="ghost" onClick={()=>startEdit(e)}>✏️ Edit</Btn>
                        <Btn small variant="danger" onClick={()=>deleteEntry(e.id)}>✕</Btn>
                      </div>
                    </div>
                    <div style={{padding:"0 14px 12px",display:"flex",gap:8,flexWrap:"wrap"}}>
                      {scores.map(({t,pts})=>(
                        <div key={t.id} style={{display:"flex",gap:6,alignItems:"center",padding:"4px 10px",borderRadius:6,background:\`\${t.color}0f\`,border:\`1px solid \${t.color}33\`}}>
                          <span style={{color:t.color,fontFamily:"'Bebas Neue',cursive",fontSize:12}}>{t.name}</span>
                          <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:18}}>{pts}</span>
                        </div>
                      ))}
                    </div>

const EDITOR_PASSWORD = "d5edit2026";

function EditorLockModal({onUnlock, onClose}){
  const [pw,setPw]=useState("");
  const [err,setErr]=useState(false);
  const [shake,setShake]=useState(false);
  const attempt=()=>{
    if(pw===EDITOR_PASSWORD){
      try{sessionStorage.setItem("d5_editor","1");}catch{}
      onUnlock();
    } else {
      setErr(true); setShake(true);
      setTimeout(()=>setShake(false),500);
      setPw("");
    }
  };
  return(
    <div style={{position:"fixed",inset:0,background:"#000000bb",zIndex:1000,display:"flex",alignItems:"center",justifyContent:"center"}}
      onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div style={{background:"#11112a",border:"1px solid #2a2a5a",borderRadius:16,padding:"32px 36px",width:300,animation:shake?"shake 0.4s ease":"none"}}>
        <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:20,color:"#FFB830",marginBottom:6,textAlign:"center",letterSpacing:2}}>🔑 EDITOR ACCESS</div>
        <div style={{fontSize:11,color:"#444",textAlign:"center",marginBottom:20,letterSpacing:1}}>Enter editor password to make changes</div>
        <input type="password" placeholder="Editor password" value={pw}
          onChange={e=>{setPw(e.target.value);setErr(false);}}
          onKeyDown={e=>e.key==="Enter"&&attempt()}
          autoFocus
          style={{width:"100%",padding:"11px 14px",background:"#07071a",border:\`1px solid \${err?"#ff4444":"#2a2a5a"}\`,borderRadius:10,color:"#e0e0f0",fontSize:14,outline:"none",marginBottom:6,letterSpacing:2}}/>
        {err&&<div style={{fontSize:11,color:"#ff6b6b",marginBottom:10,textAlign:"center"}}>Incorrect password.</div>}
        {!err&&<div style={{height:16}}/>}
        <div style={{display:"flex",gap:8}}>
          <button onClick={onClose} style={{flex:1,padding:"10px",borderRadius:10,border:"1px solid #2a2a5a",background:"transparent",color:"#555",fontFamily:"'Bebas Neue',cursive",fontSize:15,letterSpacing:1}}>CANCEL</button>
          <button onClick={attempt} style={{flex:2,padding:"10px",borderRadius:10,border:"none",background:"linear-gradient(135deg,#FFB83022,#FF6B3522)",borderTop:"1px solid #FFB83044",color:"#FFB830",fontFamily:"'Bebas Neue',cursive",fontSize:15,letterSpacing:1}}>UNLOCK →</button>
        </div>
      </div>
      <style>{\`@keyframes shake{0%,100%{transform:translateX(0);}20%{transform:translateX(-8px);}40%{transform:translateX(8px);}60%{transform:translateX(-6px);}80%{transform:translateX(6px);}}\`}</style>
    </div>
  );
}

                    <TeamChip code={match.team2} large/>
                  </div>
                  {sd&&(sd.score||[]).map((s,i)=>(
                    <div key={i} style={{padding:"0 12px 4px",display:"flex",justifyContent:"space-between"}}>
                      <span style={{fontSize:11,color:"#888"}}>{s.inning}</span>
                      <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:16,color:"#00C9FF"}}>{s.r}/{s.w} ({s.o})</span>
                    </div>
                  ))}
                  {isExp&&<div style={{padding:"8px 12px 12px",borderTop:"1px solid #1a1a3a",fontSize:10,color:"#444"}}>📍 {match.venue}</div>}
                  <div style={{height:3,background:\`linear-gradient(90deg,\${t1?.color||"#444"},\${t2?.color||"#444"})\`}}/>
                </div>
              );
            })}
          </div>
        </div>
      )}

      {tab==="live"&&(
        <div style={{maxWidth:1400,margin:"0 auto",padding:"22px 24px"}}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20,flexWrap:"wrap",gap:10}}>
            <div style={{display:"flex",alignItems:"center",gap:10}}>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:24}}>📡 Live Scores</div>
              {liveNow.length>0&&<LiveBadge/>}
            </div>
            <div style={{display:"flex",gap:8,alignItems:"center",flexWrap:"wrap"}}>
              {lastRefresh&&<span style={{fontSize:10,color:"#333"}}>Updated: {lastRefresh}</span>}
              <Btn variant="warning" onClick={refreshScores} disabled={loading}>{loading?"⏳ Loading…":"🔄 Refresh"}</Btn>
              <Btn variant={autoRefresh?"danger":"ghost"} onClick={()=>setAutoRefresh(a=>!a)}>{autoRefresh?"⏹ Stop Auto":"▶ Auto 30s"}</Btn>
            </div>
          </div>
          <div style={{marginBottom:12,padding:"8px 14px",borderRadius:8,background:"#0a2a0a",border:"1px solid #A8FF3E33",display:"inline-flex",alignItems:"center",gap:8,fontSize:11,color:"#A8FF3E"}}>
            ✓ API Key configured — <span style={{color:"#555"}}>cricketdata.org</span>
          </div>
          {liveNow.length===0&&(
            <Card style={{textAlign:"center",padding:32,marginTop:12}}>
              <div style={{fontSize:36}}>😴</div>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:18,color:"#444",marginTop:8}}>No Live IPL Matches Right Now</div>
              <div style={{fontSize:12,color:"#333",marginTop:5}}>
                {upcoming.length>0?\`Next: \${upcoming[0].team1} vs \${upcoming[0].team2} · \${fmtDate(upcoming[0].date)}\`:"IPL 2026 starts March 28!"}
              </div>
              <div style={{marginTop:16}}><Btn variant="warning" onClick={refreshScores} disabled={loading}>{loading?"⏳":"🔄 Check Now"}</Btn></div>
            </Card>
          )}
          {Object.keys(liveScores).length>0&&(
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(300px,1fr))",gap:12,marginTop:16}}>
              {IPL_SCHEDULE.filter(m=>liveScores[m.id]).map(m=>{
                const sd=liveScores[m.id];const t1=IPL_TEAMS[m.team1];const t2=IPL_TEAMS[m.team2];
                return(
                  <Card key={m.id} style={{border:"1px solid #ff333344"}}>
                    <LiveBadge/>
                    <div style={{display:"flex",justifyContent:"space-between",margin:"10px 0"}}>
                      <TeamChip code={m.team1} large/><TeamChip code={m.team2} large/>
                    </div>
                    {(sd.score||[]).map((s,i)=>(
                      <div key={i} style={{padding:"6px 0",borderBottom:"1px solid #1a1a3a",display:"flex",justifyContent:"space-between"}}>
                        <span style={{fontSize:12,color:"#888"}}>{s.inning}</span>
                        <span style={{fontFamily:"'Bebas Neue',cursive",fontSize:22,color:"#00C9FF"}}>{s.r}/{s.w} <span style={{fontSize:12,color:"#444"}}>({s.o})</span></span>
                      </div>
                    ))}
                    {sd.status&&<div style={{fontSize:11,color:"#FFB830",marginTop:8}}>{sd.status}</div>}
                  </Card>
                );
              })}
            </div>
          )}
          {upcoming.length>0&&(
            <div style={{marginTop:28}}>
              <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:16,color:"#444",marginBottom:10}}>UPCOMING</div>
              <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(260px,1fr))",gap:10}}>
                {upcoming.slice(0,6).map(m=>{const t1=IPL_TEAMS[m.team1];const t2=IPL_TEAMS[m.team2];const d=getDaysUntil(m.date);return(
                  <div key={m.id} style={{background:"#11112a",border:"1px solid #1e1e40",borderRadius:10,overflow:"hidden"}}>
                    <div style={{height:2,background:\`linear-gradient(90deg,\${t1?.color||"#444"},\${t2?.color||"#444"})\`}}/>
                    <div style={{padding:"10px 12px",display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:15}}>{m.team1} vs {m.team2}</div><div style={{fontSize:10,color:"#444"}}>{fmtDate(m.date)} · {m.time}</div></div>
                      <StatusBadge status="upcoming" daysUntil={d}/>
                    </div>
                  </div>
                );})}
              </div>
            </div>
          )}
        </div>
      )}

      {tab==="teams"&&(
        <div style={{maxWidth:1400,margin:"0 auto",padding:"22px 24px"}}>
          <div style={{fontFamily:"'Bebas Neue',cursive",fontSize:24,marginBottom:18}}>🏏 IPL 2026 Teams</div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(220px,1fr))",gap:12}}>
            {Object.entries(IPL_TEAMS).map(([code,t])=>{
              const tm=IPL_SCHEDULE.filter(m=>m.team1===code||m.team2===code);
              const played=tm.filter(m=>getMatchStatus(m)==="completed").length;
              return(
                <div key={code} onClick={()=>{setFilterTeam(code);setTab("schedule");}}
                  style={{background:"#11112a",border:\`1px solid \${t.color}28\`,borderRadius:12,overflow:"hidden",cursor:"pointer",transition:"all .2s"}}
                  onMouseEnter={e=>{e.currentTarget.style.borderColor=t.color;e.currentTarget.style.transform="translateY(-2px)";}}
                  onMouseLeave={e=>{e.currentTarget.style.borderColor=\`\${t.color}28\`;e.currentTarget.style.transform="";}}>
                  <div style={{height:3,background:t.color}}/>
                  <div style={{padding:"14px"}}>
                    <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:10}}>
                      <div style={{width:38,height:38,borderRadius:"50%",background:\`\${t.color}18\`,border:\`2px solid \${t.color}\`,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Bebas Neue',cursive",fontSize:13,color:t.color}}>{code}</div>
                      <div><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:15}}>{code}</div><div style={{fontSize:10,color:"#555"}}>{t.name}</div></div>
                    </div>
                    <div style={{display:"flex",gap:12}}>
                      {[["M",tm.length,t.color],["Done",played,"#A8FF3E"],["Left",tm.length-played,"#00C9FF"]].map(([l,v,c])=>(
                        <div key={l}><div style={{fontFamily:"'Bebas Neue',cursive",fontSize:18,color:c}}>{v}</div><div style={{fontSize:9,color:"#444"}}>{l}</div></div>
                      ))}
                    </div>
                  </div>
                </div>
              );
            })}
          </div>
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
document.getElementById('loading').style.display = 'none';
